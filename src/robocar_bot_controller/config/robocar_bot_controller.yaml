controller_manager:
  ros__parameters:
    update_rate: 100 # Hz
    use_sim_time: true

    robocar_bot_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


robocar_bot_controller:
  ros__parameters:
    type        : diff_drive_controller/DiffDriveController

    left_wheel_names  : ['wheel_left_joint']
    right_wheel_names : ['wheel_right_joint']

    publish_rate: 50.0               # default: 50
    pose_covariance_diagonal : [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.01]

    wheel_separation : 0.16
    wheel_radius : 0.033

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Velocity commands timeout [s], default 0.5
    use_stamped_vel: true
    cmd_vel_timeout: 0.5

    # Base frame_id
    base_frame_id: base_footprint #default: base_link

    # Publish limited velocity
    publish_limited_velocity: true

    # Publish wheel data
    publish_wheel_data: true

    # Publish to TF directly or not
    enable_odom_tf: true

    # Limites físicos baseados nos motores reais do TurtleBot3
    linear:
      x:
        has_velocity_limits    : true
        max_velocity           : 0.22 # Ajustado para o limite real
        min_velocity           : -0.22
        has_acceleration_limits: true
        max_acceleration       : 1.0  
        min_acceleration       : -1.0 
        has_jerk_limits        : false
        max_jerk               : 5.0  
    angular:
      z:
        has_velocity_limits    : true
        max_velocity           : 2.84 # Ajustado para o limite real
        has_acceleration_limits: true
        max_acceleration       : 2.0  
        has_jerk_limits        : false
        max_jerk               : 2.5